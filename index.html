<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>New Tab</title>
	<link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">
	<div id="app">
		<header>
			<div class="breadcrumb" id="breadcrumb">
				<!-- Breadcrumbs injected here -->
			</div>
			<button id="settings-btn" class="icon-btn">
				<svg viewBox="0 0 24 24" width="24" height="24">
					<path fill="currentColor"
						d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.35 19.43,11.03L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.97 19.05,5.05L16.56,6.05C16.04,5.65 15.44,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.56,5.32 7.96,5.65 7.44,6.05L4.95,5.05C4.73,4.97 4.46,5.05 4.34,5.27L2.34,8.73C2.22,8.95 2.27,9.22 2.46,9.37L4.57,11.03C4.53,11.35 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.22,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.95C7.96,18.35 8.56,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.44,18.68 16.04,18.35 16.56,17.95L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" />
				</svg>
			</button>
		</header>

		<main id="grid-container">
			<!-- Grid injected here -->
		</main>

		<!-- Settings Modal -->
		<div id="settings-modal" class="modal hidden">
			<div class="modal-overlay"></div>
			<div class="modal-content">
				<h2 data-i18n="settings">Settings</h2>
				<div class="settings-group">
					<label data-i18n="theme">Theme</label>
					<select id="theme-select">
						<option value="theme-auto" data-i18n="auto">Auto</option>
						<option value="theme-dark" data-i18n="dark">Dark</option>
						<option value="theme-light" data-i18n="light">Light</option>
					</select>
				</div>
				<div class="settings-group checkbox-group">
					<label>
						<input type="checkbox" id="show-count-checkbox">
						<span data-i18n="showCount">Show item count</span>
					</label>
				</div>
				<div class="settings-group">
					<label data-i18n="language">Language</label>
					<select id="lang-select">
						<option value="en">English</option>
						<option value="ru">Русский</option>
					</select>
				</div>
				<div class="settings-group">
					<label data-i18n="folderStyle">Folder Style</label>
					<select id="folder-style-select">
						<option value="solid" data-i18n="solid" selected>Icon</option>
						<option value="glass" data-i18n="glass">Preview</option>
					</select>
				</div>
				<div class="settings-group">
					<label data-i18n="startFolder">Start Folder</label>
					<select id="start-folder-select">
						<!-- Options injected here -->
					</select>
				</div>
				<div class="settings-group">
					<label data-i18n="background">Background</label>
					<div class="bg-settings">
						<input type="text" id="bg-image-input" data-i18n="bgImage" placeholder="Image URL">
						<div class="btn-row" style="margin-top: 8px;">
							<input type="color" id="bg-color-input" class="color-input">
							<button id="remove-bg-btn" data-i18n="removeBg">Remove</button>
						</div>
					</div>
				</div>
				<div class="settings-group">
					<label data-i18n="data">Data</label>
					<div class="btn-row">
						<button id="export-btn" class="icon-text-btn">
							<svg viewBox="0 0 24 24" width="18" height="18">
								<path fill="currentColor"
									d="M14,2L20,8V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V4A2,2 0 0,1 6,2H14M18,20V9H13V4H6V20H18M12,19L8,15H10.5V11H13.5V15H16L12,19Z" />
							</svg>
							<span data-i18n="export">Export</span>
						</button>
						<button id="import-btn-trigger" class="icon-text-btn">
							<svg viewBox="0 0 24 24" width="18" height="18">
								<path fill="currentColor"
									d="M14,2L20,8V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V4A2,2 0 0,1 6,2H14M18,20V9H13V4H6V20H18M12,11L16,15H13.5V19H10.5V15H8L12,11Z" />
							</svg>
							<span data-i18n="import">Import</span>
						</button>
					</div>
					<button id="refresh-favicons-btn" class="secondary-btn" style="margin-top: 8px; width: 100%;"
						data-i18n="refreshFavicons">Refresh Favicons</button>
					<input type="file" id="import-input" style="display:none" accept=".json">
				</div>
				<button class="close-modal-btn primary-btn" data-i18n="close">Close</button>
			</div>
		</div>

		<!-- Add/Edit Modal -->
		<div id="add-modal" class="modal hidden">
			<div class="modal-overlay"></div>
			<div class="modal-content">
				<h2 id="modal-title" data-i18n="add">Add</h2>
				<div class="tabs" id="modal-tabs">
					<button class="tab-btn active" data-tab="bookmark" data-i18n="bookmark">Bookmark</button>
					<button class="tab-btn" data-tab="folder" data-i18n="folder">Folder</button>
				</div>
				<div id="bookmark-form" class="tab-content">
					<input type="text" id="bm-title" data-i18n="title" placeholder="Title">
					<input type="text" id="bm-url" data-i18n="url" placeholder="URL (https://...)">
				</div>
				<div id="folder-form" class="tab-content hidden">
					<input type="text" id="folder-name" data-i18n="folderName" placeholder="Folder Name">
				</div>
				<div class="modal-actions">
					<button id="save-btn" class="primary-btn" data-i18n="save">Save</button>
					<button class="close-modal-btn" data-i18n="cancel">Cancel</button>
				</div>
			</div>
		</div>

		<!-- Context Menu -->
		<div id="context-menu" class="context-menu hidden">
			<div class="menu-item" id="ctx-edit" data-i18n="edit">Edit</div>
			<div class="menu-item" id="ctx-hide" data-i18n="hideFolder">Hide Folder</div>
			<div class="menu-item delete" id="ctx-delete" data-i18n="delete">Delete</div>
		</div>

		<!-- Hidden Folders Menu -->
		<div id="hidden-folders-menu" class="context-menu hidden">
			<div class="menu-header" data-i18n="hiddenFolders">Hidden Folders</div>
			<div id="hidden-folders-list"></div>
		</div>

		<!-- Notifications -->
		<div id="notification-container"></div>

		<footer>
			<div class="footer-content">
				<a href="https://github.com/username391/lumina-tab" target="_blank" class="app-name">Lumina Tab</a>
				<div class="footer-links">
					<a href="https://github.com/username391/lumina-tab" target="_blank"
						data-i18n="footerGithub">GitHub</a>
					<a href="https://t.me/kilrea" target="_blank" data-i18n="footerTelegram">Telegram</a>
				</div>
			</div>
		</footer>
	</div>

	<script src="i18n.js"></script>
	<script src="utils.js"></script>
	<script src="storage.js"></script>
	<script src="ui.js"></script>
	<script src="script.js"></script>
</body>

</html>
